name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest & ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
      - name: Ruff
        run: ruff check custom_components/grundwasser_de tests
      - name: Pytest
        run: pytest -q
