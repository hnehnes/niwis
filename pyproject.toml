[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "D", "SIM", "C4"]
ignore = ["D203", "D213"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D100", "D103", "D104"]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.niwis"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
